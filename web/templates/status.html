{% extends "base.html" %}
{% block title %}Processing — pcap-tool{% endblock %}
{% block content %}
<h1>Analysing {{ job.filename }}</h1>

<div class="card">
  <p id="state-line">State: <strong id="state">{{ job.state }}</strong></p>
  <pre id="progress-log">{% for line in job.progress %}{{ line }}
{% endfor %}</pre>
  <div id="error-box" class="alert alert-error" {% if not job.error %}style="display:none"{% endif %}>
    {{ job.error }}
  </div>
</div>

<script>
  pcapToolPollStatus("{{ url_for('job_status', job_id=job.id) }}",
                      "{{ url_for('job_results', job_id=job.id) }}");
</script>
{% endblock %}
